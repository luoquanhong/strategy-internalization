actions:
- 构建价值/风险/成本三维评估矩阵，每维定义2-3个可量化指标
- 对候选任务逐项打分并聚类，生成科学的推进顺序
- 确保评估维度客观且正交，避免维度间信息重叠导致偏差
- 优先阻断系统性风险项，再按投入产出比降序执行
- 排序结果需经至少2人交叉复核，防止单一视角盲区
