actions:
- 评估系统功能矩阵，区分核心业务逻辑与辅助功能
- 识别资源消耗大但对核心目标贡献度低的模块
- 对非核心模块采取降级或限制触发条件
- 必要时直接剥离禁用最耗资源的非核心功能
- 以最小业务损伤换取最大性能或成本收益
