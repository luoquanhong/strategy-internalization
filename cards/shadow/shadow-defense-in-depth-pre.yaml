actions:
- 梳理演进路径，明确定义不可逾越的风险红线
- 由近及远设计多道独立安全闸门：本地静态检查→CI自动化测试阻断→预发环境校验→线上运行时熔断兜底
- 所有防护机制实现自动化判定且硬性阻断危险变更，不依赖人工判断
- 多重防护网全部就绪并验证有效后才执行后续工程上线动作
- 上线后持续监控防护网触发频率，异常高频说明设计有遗漏需回溯加固
